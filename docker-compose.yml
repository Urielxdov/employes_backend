version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: employees-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: employees
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-employees-master:/docker-entrypoint-initdb.d
    working_dir: /docker-entrypoint-initdb.d
    networks:
      - employees-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: employees-api
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: root_password
      API_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - employees-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  mysql_data:

networks:
  employees-net:
    driver: bridge
